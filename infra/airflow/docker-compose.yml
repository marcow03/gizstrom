services:
  airflow:
    image: ghcr.io/marcow03/gizstrom/airflow
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ../../src/dags:/opt/airflow/dags
      - ../../data/airflow/data:/opt/airflow/data
      - ../../data/airflow/data/logs:/opt/airflow/logs
      - ../../data/airflow/data/config:/opt/airflow/config
      - ../../data/compute-instance/docker-certs:/certs
      - /var/run/docker.sock:/var/run/docker.sock # For quicker testing, use host's docker.
    environment:
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: True
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: True
      TEST: "test_value"
    networks:
      - production
      - development
      - ingress
    command: standalone
    user: "50000:0"
    working_dir: /opt/airflow
