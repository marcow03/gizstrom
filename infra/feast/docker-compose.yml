services:
  feast-ui:
    image: ghcr.io/marcow03/gizstrom/feast-ui
    # for testing, we can build the image locally
    # build: .
    restart: unless-stopped
    depends_on:
      rustfs:
        condition: service_healthy
      create-buckets:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    volumes:
      - ../../src/pipelines/config/feature_store.yaml:/opt/feast/feature_repo/feature_store.yaml
    environment:
      FEAST_REGISTRY_DESTINATION: ${FEAST_REGISTRY_DESTINATION}
      FEAST_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_ADDRESSING_STYLE: path
    networks:
      - production
    command: "feast ui --host 0.0.0.0 --port 8088"
    working_dir: /opt/feast/feature_repo
