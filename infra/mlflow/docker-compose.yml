services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    depends_on:
      rustfs:
        condition: service_healthy
      create-buckets:
        condition: service_completed_successfully
    ports:
      - "${MLFLOW_PORT}:${MLFLOW_PORT}"
    volumes:
      - ../../data/mlflow/metadata:/metadata
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      MLFLOW_ARTIFACTS_DESTINATION: ${MLFLOW_ARTIFACTS_DESTINATION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_IGNORE_TLS: "true"
      MLFLOW_HOST: ${MLFLOW_HOST}
      MLFLOW_PORT: ${MLFLOW_PORT}
      MLFLOW_DISABLE_TELEMETRY: true
      DO_NOT_TRACK: true
    networks:
      - production
      - development
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MLFLOW_PORT}/health')" ]
      interval: 10s
      timeout: 5s
      retries: 30
    command:
      - /bin/bash
      - -c
      - |
        if ! (pip show psycopg2-binary > /dev/null 2>&1 && pip show boto3 > /dev/null 2>&1); then
          pip install --no-cache-dir psycopg2-binary boto3
        fi
        mlflow server \
          --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
          --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}" \
          --serve-artifacts \
          --host "${MLFLOW_HOST}" \
          --port "${MLFLOW_PORT}" \
          --disable-security-middleware