name: Build images and push to registry
on:
  push:
    paths:
      - "src/pipelines/**"
      - "src/app/**"
      - "infra/airflow/Dockerfile"
      - "infra/feast/Dockerfile"
      - ".github/workflows/docker.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push `pipelines` image
        id: build-push-pipelines
        uses: docker/build-push-action@v6
        with:
          context: ./src/pipelines
          push: true
          tags: ${{ env.REGISTRY }}/pipelines:${{ github.ref_name }}, ${{ env.REGISTRY }}/pipelines:latest

      - name: Build and push `app` image
        id: build-push-app
        uses: docker/build-push-action@v6
        with:
          context: ./src/app
          push: true
          tags: ${{ env.REGISTRY }}/app:${{ github.ref_name }}, ${{ env.REGISTRY }}/app:latest

      - name: Build and push `aiflow` image
        id: build-push-airflow
        uses: docker/build-push-action@v6
        with:
          context: ./infra/airflow
          push: true
          tags: ${{ env.REGISTRY }}/airflow:${{ github.ref_name }}, ${{ env.REGISTRY }}/airflow:latest

      - name: Build and push `feast` image
        id: build-push-feast
        uses: docker/build-push-action@v6
        with:
          context: ./infra/feast
          push: true
          tags: ${{ env.REGISTRY }}/feast:${{ github.ref_name }}, ${{ env.REGISTRY }}/feast:latest
