name: Build multi-platform images
on:
  push:
    paths:
      - "src/pipelines/**"
      - "src/app/**"
      - "infra/airflow/Dockerfile"
      - "infra/feast/Dockerfile"
      - ".github/workflows/docker.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          for target in pipelines app airflow feast; do
            if [[ "$target" == "pipelines" || "$target" == "app" ]]; then
              CONTEXT="./src/$target"
            else
              CONTEXT="./infra/$target"
            fi

            echo "Building $target..."

            docker buildx build \
              --platform ${{ env.PLATFORMS }} \
              --push \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$target:${{ github.ref_name }} \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$target:latest \
              --cache-from type=gha,scope=$target \
              --cache-to type=gha,mode=max,scope=$target \
              "$CONTEXT"
          done
